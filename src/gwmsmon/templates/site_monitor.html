{% extends "base.html" %}
{% block title %}Site Monitor — {{ view_cfg.title }} — gwmsmon{% endblock %}
{% block content %}
<h1><a href="/{{ view }}/">{{ view_cfg.title }}</a> / Site Monitor</h1>
<input type="text" id="site-filter" placeholder="Filter sites..." style="margin-bottom:12px;padding:6px 10px;width:300px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text)">
<div id="site-charts" style="display:flex;flex-wrap:wrap;gap:8px">
{% for site in site_names %}
<div class="site-chart-row" data-site="{{ site }}">
  <div style="font-size:12px;font-weight:600;text-align:center;padding:2px 0"><a href="/{{ view }}/site/{{ site }}">{{ site }}</a></div>
  <div class="chart" data-src="/{{ view }}/tsdata/sites" data-chart-type="site-monitor" data-interval="weekly" data-entity="{{ site }}"></div>
</div>
{% endfor %}
</div>
<script>
(function() {
  var filter = document.getElementById('site-filter');
  var rows = document.querySelectorAll('.site-chart-row');
  function apply() {
    var q = filter.value.toLowerCase();
    rows.forEach(function(r) {
      r.style.display = (!q || r.dataset.site.toLowerCase().indexOf(q) !== -1) ? '' : 'none';
    });
  }
  filter.addEventListener('input', apply);
})();
</script>
{% endblock %}
